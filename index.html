<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saventure : Interior Design, Architecture & Digital Marketing...</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="logo.png">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<section class="project-details">

    <div class="details-wrapper">

        <div class="detail-box">
            <div class="icon">
                <i class="fa-solid fa-key"></i>
            </div>

            <div class="text">
                <h4>Project Status</h4>
                <p>Ready to Move In</p>
            </div>
        </div>

        <div class="detail-box">
            <div class="icon">
                <i class="fa-solid fa-location-dot"></i>
            </div>

            <div class="text">
                <h4>Location</h4>
                <p>Sakaleshpur</p>
            </div>
        </div>

        <div class="detail-box">
            <div class="icon">
                <i class="fa-solid fa-building"></i>
            </div>

            <div class="text">
                <h4>Property Type</h4>
                <p>Farm Plots</p>
            </div>
        </div>

        <div class="detail-box">
            <div class="icon">
                <i class="fa-regular fa-square"></i>
            </div>

            <div class="text">
                <h4>Total Usable Area</h4>
                <p>1075 Sqft - 4843 Sqft</p>
            </div>
        </div>

        <div class="detail-box">
            <div class="icon">
                <i class="fa-solid fa-draw-polygon"></i>
            </div>

            <div class="text">
                <h4>Total Project Land Area</h4>
                <p>8.23 Acres</p>
            </div>
        </div>

    </div>

</section>



<section class="master-plan">

<div class="container">

<div class="left">

<h1>MASTER PLAN</h1>

</div>

<div class="right">

<label for="zoom">
<i class="fa-solid fa-magnifying-glass-plus"></i>
Click image to enlarge
</label>

<input type="checkbox" id="zoom">

<label for="zoom" class="image-box">

<img src="images/masterplan.png" alt="Master Plan">

</label>

</div>

</div>

</section>

</body>
</html>
